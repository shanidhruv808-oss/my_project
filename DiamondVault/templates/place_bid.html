{% extends 'base.html' %}

{% block content %}

<div class="container py-5" style="max-width:500px">
    
    <h3 class="mb-4">Place Bid for {{ diamond.name }}</h3>
    
    <img src="{{ diamond.image.url }}" class="img-fluid mb-3 rounded">
    
    <h4 class="text-primary">Current Price: ₹{{ diamond.price }}</h4>
    
    <form method="POST" action="{% url 'place_bid' diamond.id %}">
    {% csrf_token %}
        
        <div class="mb-3">
            <label>Bid Amount</label>
            <input type="number" name="amount" class="form-control" required min="{{ diamond.price|add:1 }}">
        </div>
        
        <button type="submit" class="btn btn-primary w-100">
            Place Bid
        </button>
    </form>
    
</div>

{% endblock %}
