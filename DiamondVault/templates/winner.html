{% extends 'base.html' %}

{% block content %}

<div class="container py-5 text-center">

<h1 class="mb-4 text-success">Auction Result</h1>

<img src="{{ diamond.image.url }}" class="img-fluid mb-4" style="max-width:300px">

<h3>{{ diamond.name }}</h3>

{% if winner %}

<h2 class="text-primary mt-4">
Winner: {{ winner.username }}
</h2>

<h4 class="mt-3">
Winning Bid: ₹{{ amount }}
</h4>

{% else %}

<h3 class="text-danger">
No bids were placed
</h3>

{% endif %}

<a href="{% url 'diamonds' %}" class="btn btn-primary mt-4">
Back to Diamonds
</a>

</div>

{% endblock %}
