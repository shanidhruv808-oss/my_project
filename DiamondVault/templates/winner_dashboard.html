<h2>Your Orders</h2>

<table class="table">
<tr>
<th>Diamond</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
</tr>

{% for order in orders %}
<tr>
<td>{{ order.diamond.name }}</td>
<td>₹{{ order.amount }}</td>
<td>{{ order.status }}</td>
<td>{{ order.created_at|date:"d M Y, H:i" }}</td>
</tr>
{% empty %}
<tr><td colspan="4">No orders yet</td></tr>
{% endfor %}
</table>
